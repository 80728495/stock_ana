# ============================================================
# US Stock Industry Taxonomy (v1 Draft)
# ============================================================
# 目标：~100 个细分标签，分两级：Sector > Sub-Industry
# 设计原则：
#   1. 第一级 sector 沿用 Finviz 11 大板块（投资者熟悉）
#   2. 第二级 sub-industry 在 Finviz industry 基础上做合并/拆分:
#      - 股票数 <5 的合并到相邻分类
#      - 过于笼统的拆分（如 Semiconductors 拆为 Fabless/IDM/Memory 等）
#   3. 标签名保持英文，便于与 Finviz/SEC 互操作
#   4. 每个标签附 description 和 finviz_map，便于 LLM 对照和自动映射
# 用法：LLM 从本列表中选择 1-2 个 sub_industry 标签，不允许自造标签
# ============================================================

# ---- Technology (272 stocks) ----
Technology:
  - label: "AI & Cloud Infrastructure"
    description: "AI chips, cloud computing platforms, GPU/TPU accelerators, hyperscale infrastructure"
    examples: [NVDA, AVGO, ALAB, CRDO]

  - label: "Semiconductors - Analog & Mixed-Signal"
    description: "Analog ICs, power management, signal processing, sensors"
    examples: [ADI, TXN, MCHP, MPWR, POWI, ON, ALGM]

  - label: "Semiconductors - Digital & Logic"
    description: "CPUs, FPGAs, ASICs, SoCs, digital logic chips, RF semiconductors"
    examples: [INTC, AMD, QCOM, ARM, LSCC, QRVO, SWKS]

  - label: "Semiconductors - Memory & Storage"
    description: "DRAM, NAND flash, storage controllers, memory IP"
    examples: [MU, SIMO, RMBS]

  - label: "Semiconductors - Foundry & OSAT"
    description: "Wafer foundry, outsourced assembly and test, semiconductor substrates"
    examples: [TSM, GFS, UMC, ASX, TSEM, AMKR, AXTI]

  - label: "Semiconductor Equipment & Materials"
    description: "Lithography, wafer inspection, EDA, process equipment, photomasks"
    examples: [AMAT, KLAC, CAMT, FORM]

  - label: "Software - Enterprise & Vertical"
    description: "ERP, CRM, HR, supply chain, industry-specific enterprise software"
    examples: [SAP, ORCL, WDAY, NOW]

  - label: "Software - Cybersecurity"
    description: "Network security, endpoint protection, identity & access, cloud security"
    examples: [CRWD, PANW, FTNT, ZS]

  - label: "Software - Developer Tools & Platforms"
    description: "Dev platforms, databases, observability, CI/CD, data infrastructure"
    examples: [MDB, DDOG, SNOW, ESTC]

  - label: "Software - FinTech"
    description: "Payments processing, digital banking, financial software (not banks/asset mgmt)"
    examples: [SQ, BILL, TOST]

  - label: "Software - Other"
    description: "Catch-all for application/infrastructure software not covered above"
    examples: []

  - label: "IT Services & Consulting"
    description: "IT outsourcing, system integration, managed services, tech consulting"
    examples: [ACN, CTSH, EPAM]

  - label: "Communication Equipment"
    description: "Networking hardware, routers, switches, optical transceivers, 5G equipment"
    examples: [CSCO, ANET, COHR, CIEN]

  - label: "Electronic Components"
    description: "Passive components, connectors, PCBs, displays, optoelectronics"
    examples: [GLW, APH, TEL]

  - label: "Computer Hardware & Storage"
    description: "PCs, servers, storage systems, peripherals, printers"
    examples: [DELL, HPQ, NTAP, PSTG]

  - label: "Scientific & Technical Instruments"
    description: "Test & measurement, lab instruments, analytical equipment"
    examples: [KEYS, TDY, COHR]

  - label: "Solar & Clean Energy Tech"
    description: "Solar panels, inverters, clean energy equipment manufacturers"
    examples: [FSLR, ENPH]

  - label: "Consumer Electronics"
    description: "Consumer devices, wearables, smart home, EV electronics"
    examples: [AAPL]

