# ============================================================
# US Stock Industry Taxonomy v2 — 三级架构
# ============================================================
#
# 分类体系：
#   Level 1  Sector       — Finviz 11 大板块（已知，不需要分类）
#   Level 2  SIC Code     — SEC EDGAR 注册代码（已知，硬约束）
#   Level 3  Sub-label    — LLM 从固定列表中选取（仅大 SIC 组需要）
#
# 工作流程：
#   1. 每只股票的 sector 和 sic_code 已经是确定事实（来自 Finviz + SEC）
#   2. 对于小型 SIC 组（<15 只股票），SIC 描述本身即最细分类，不需要 LLM
#   3. 仅对大型 SIC 组（≥15 只股票，共 ~23 个），LLM 从下方固定列表选 1 个 sub_label
#   4. LLM 不允许自造标签，只能从该 SIC 对应的 sub_labels 列表中选择
#
# 最终输出字段（每只股票）：
#   sector, sic_code, sic_description, sub_label (可为空)
#
# ============================================================


# ============================================================
#                    需要 Sub-label 的 SIC 组
# ============================================================
# 以下 SIC 代码因股票数量多、内部差异大，需要 LLM 进一步细分。
# 其余 ~266 个 SIC 代码（覆盖 ~700 只股票）不需要 sub_label。

