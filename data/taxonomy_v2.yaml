# ============================================================
#   不需要 Sub-label 的 SIC 组（~266 个，覆盖 ~700 只股票）
# ============================================================
# 以下 SIC 代码因股票数少、描述已足够精确，不需要 LLM 打标签。
# 分类时直接使用 sic_description 作为最终标签。
#
# 示例：
#   SIC 3827 (Optical Instruments & Lenses)     → COHR, KLAC, CAMT
#   SIC 3576 (Computer Communications Equipment) → CSCO, ANET, FFIV
#   SIC 3572 (Computer Storage Devices)          → NTAP, PSTG, STX
#   SIC 3826 (Laboratory Analytical Instruments) → A, ILMN, WAT
#   SIC 3559 (Special Industry Machinery, NEC)   → ASML, LRCX, ACLS
#   SIC 3672 (Printed Circuit Boards)            → FLEX, JBL, CLS
#   SIC 4512 (Air Transportation, Scheduled)     → DAL, UAL, LUV
#   SIC 4922 (Natural Gas Transmission)          → WMB, KMI, ET
#   SIC 3714 (Motor Vehicle Parts & Accessories) → APTV, BWA, LEA
#   SIC 5812 (Retail-Eating Places)              → MCD, CMG, YUM
#
# 完整列表在 us_sec_profiles.csv 中，按 sic_code 字段查阅。


